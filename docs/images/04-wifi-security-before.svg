<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Avviso iOS prima della correzione Wi-Fi</title>
  <desc id="desc">Ricostruzione anonimizzata della schermata che segnala WPA/WPA2 TKIP come sicurezza debole.</desc>
  <rect width="900" height="760" fill="#f2f2f7"/>
  <text x="450" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#111">SecurityGatewayLab</text>
  <rect x="55" y="125" width="790" height="330" rx="38" fill="#fff"/>
  <text x="95" y="190" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#111">Livello sicurezza basso</text>
  <text x="95" y="245" font-family="system-ui, sans-serif" font-size="31" fill="#777">La crittografia WPA/WPA2 (TKIP) non è</text>
  <text x="95" y="288" font-family="system-ui, sans-serif" font-size="31" fill="#777">considerata sicura.</text>
  <text x="95" y="350" font-family="system-ui, sans-serif" font-size="31" fill="#777">Configurare la rete per utilizzare</text>
  <text x="95" y="393" font-family="system-ui, sans-serif" font-size="31" fill="#777">WPA2 (AES) oppure WPA3.</text>
  <rect x="55" y="505" width="790" height="105" rx="38" fill="#fff"/>
  <text x="95" y="572" font-family="system-ui, sans-serif" font-size="34" fill="#007aff">Dissocia questa rete</text>
  <text x="450" y="690" text-anchor="middle" font-family="system-ui, sans-serif" font-size="23" fill="#666">Ricostruzione pubblica anonimizzata dello screenshot reale</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-labelledby="title desc">
  <title id="title">Verifica anonimizzata dei client associati all'hotspot</title>
  <desc id="desc">Ricostruzione anonimizzata dell'output ip neigh, nmcli e iw station dump osservato durante la fase 3.</desc>
  <rect width="980" height="760" fill="#050505"/>
  <style>
    text { font-family: "DejaVu Sans Mono", "Liberation Mono", monospace; font-size: 19px; fill: #f2f2f2; }
    .heading { fill: #f5e642; }
    .ip { fill: #ff3df2; }
    .ok { fill: #63e66b; }
    .muted { fill: #bdbdbd; }
  </style>
  <text x="28" y="42" class="heading">=== CLIENT OSSERVATI ===</text>
  <text x="28" y="76"><tspan class="ip">10.42.0.143</tspan><tspan> lladdr &lt;CLIENT_MAC_1&gt; </tspan><tspan class="ok">REACHABLE</tspan></text>
  <text x="28" y="108"><tspan class="ip">10.42.0.47</tspan><tspan> FAILED</tspan></text>

  <text x="28" y="158" class="heading">=== STATO HOTSPOT ===</text>
  <text x="28" y="192">GENERAL.STATE:          100 (collegato)</text>
  <text x="28" y="224">GENERAL.CONNECTION:     security-gateway-ap</text>
  <text x="28" y="256">IP4.ADDRESS[1]:         10.42.0.1/24</text>

  <text x="28" y="306" class="heading">=== STAZIONI WI-FI ASSOCIATE ===</text>
  <text x="28" y="340">Station &lt;CLIENT_MAC_1&gt; (on &lt;AP_IF&gt;)</text>
  <text x="68" y="372">authorized:       <tspan class="ok">yes</tspan></text>
  <text x="68" y="404">authenticated:    <tspan class="ok">yes</tspan></text>
  <text x="68" y="436">associated:       <tspan class="ok">yes</tspan></text>
  <text x="68" y="468">signal:           -18 dBm</text>
  <text x="68" y="500">tx bitrate:       117.0 MBit/s</text>
  <text x="68" y="532">rx bitrate:       65.0 MBit/s</text>
  <text x="68" y="564">connected time:   137 seconds</text>

  <text x="500" y="340">Station &lt;CLIENT_MAC_2&gt; (on &lt;AP_IF&gt;)</text>
  <text x="540" y="372">authorized:       <tspan class="ok">yes</tspan></text>
  <text x="540" y="404">authenticated:    <tspan class="ok">yes</tspan></text>
  <text x="540" y="436">associated:       <tspan class="ok">yes</tspan></text>
  <text x="540" y="468">signal:           -32 dBm</text>
  <text x="540" y="500">tx bitrate:       39.0 MBit/s</text>
  <text x="540" y="532">rx bitrate:       65.0 MBit/s</text>

  <text x="28" y="632" class="muted">MAC, hostname e nome completo dell'interfaccia sono stati rimossi.</text>
  <text x="28" y="664" class="muted">Figura ricostruita dai risultati reali osservati il 15 luglio 2026.</text>
</svg>
